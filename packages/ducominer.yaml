substitutions:
  duco_user: "-"
  duco_key: "-"
  worker_name: "Auto"

external_components:
  - source:
      type: git
      url: https://github.com/andrewjswan/duco-miner
      ref: main
    components: [duco]

duco:
  id: miner
  username: "${duco_user}"
  key: "${duco_key}"
  name: "${worker_name}"

sensor:
  - platform: duco
    hashrate:
      name: "Hashrate"
      web_server:
        sorting_weight: 2
    accepted_shares:
      name: "Accepted shares"
      web_server:
        sorting_weight: 3
    total_shares:
      name: "Total shares"
      web_server:
        sorting_weight: 4
    accept_rate:
      name: "Accept rate"
      web_server:
        sorting_weight: 5

binary_sensor:
  - platform: duco
    status:
      name: "Miner status"
      web_server:
        sorting_weight: 1

text_sensor:
  - platform: duco
    cores_status:
      name: "Cores status"
      web_server:
        sorting_weight: 2
