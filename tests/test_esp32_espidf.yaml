substitutions:
  device: "test"
  name: "test"
  friendly_name: "DucoMiner - Test"

esp32:
  variant: esp32
  framework:
    type: esp-idf

dashboard_import:
  package_import_url: github://andrewjswan/duco-mine/tests/test_esp32_espidf.yaml@main

external_components:
  - id: !remove duco_component
  - source:
      type: local
      path: ../components
    components: [duco]

packages:
  common: !include ../packages/common.yaml
  duco: !include ../packages/ducominer.yaml
  config: !include ../packages/configuration.yaml
  esp32: !include ../packages/esp32.yaml
  http_ota: !include ../packages/http_ota.yaml
